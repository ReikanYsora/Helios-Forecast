name: validate

on:
  push:
    branches:
      - main
      - 'develop-**'
      - '[0-9]*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa # main
        with:
          category: integration

  import-check:
    # Installs Home Assistant and imports the HA-coupled modules, so a wrong API
    # name or import surfaces in CI rather than only when a user loads the card.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: pip install homeassistant
      - run: |
          python - <<'PY'
          import importlib
          mods = ["__init__", "coordinator", "sensor", "energy", "websocket", "config_flow", "config", "summary"]
          for m in mods:
              importlib.import_module(f"custom_components.helios_forecast.{m}")
          print("imports ok:", ", ".join(mods))
          PY

name: tests

on:
  push:
    branches:
      - main
      - 'develop-**'
      - '[0-9]*'
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      # The suite only exercises the pure (stdlib-only) computation modules, so
      # pytest alone is enough. Add homeassistant deps here if HA-coupled tests land.
      - run: pip install pytest
      - run: pytest -q
